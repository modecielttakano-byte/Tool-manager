<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>工具 貸出・返却</title>
<style>
/* スタイルは維持しつつ、ボタンのデザインを微調整 */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #f0f2f5; color: #333; }
.header { background: linear-gradient(135deg, #1a73e8, #0d47a1); color: white; padding: 16px; text-align: center; }
.page { display: none; padding: 16px; padding-bottom: 80px; }
.page.active { display: block; }
#reader-container {
  width: 100%; max-width: 500px; margin: 0 auto;
  position: relative; aspect-ratio: 1/1;
  background: #000; border-radius: 12px; overflow: hidden;
}
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
#canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }
#camera-trigger {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
  justify-content: center; align-items: center; z-index: 20; color: white;
}
.start-btn { padding: 18px 36px; font-size: 20px; background: #1a73e8; color: white; border: none; border-radius: 50px; font-weight: bold; }
.scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; border: 2px solid rgba(255,255,255,0.5); z-index: 10; pointer-events: none; }

.card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
select, input, textarea { width: 100%; padding: 12px; margin: 8px 0 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
.btn-primary { background: #1a73e8; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
.btn-finish { background: #5f6368; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 20px; }
.nav-bar { position: fixed; bottom: 0; width: 100%; height: 64px; background: white; display: flex; border-top: 1px solid #ddd; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; }

/* 読み込み中表示 */
#loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.8); z-index:1000; justify-content:center; align-items:center; flex-direction:column; }
</style>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

<div id="loading"><div>⏳ 送信中...</div></div>

<div class="header"><h1>工具 貸出・返却</h1></div>

<div id="pageScan" class="page active">
  <div id="reader-container">
    <video id="video" playsinline muted autoplay></video>
    <canvas id="canvas"></canvas>
    <div id="camera-trigger">
        <button class="start-btn" onclick="manualStart()">カメラを起動する</button>
    </div>
    <div class="scan-guide"></div>
  </div>
  <button class="btn-finish" onclick="location.reload()">入力を終了してリセット</button>
</div>

<div id="pageForm" class="page">
  <div class="card">
    <h3 id="displayName">工具名</h3>
    <p id="displayId" style="color:#666; font-size:12px; margin-bottom:15px;"></p>
    
    <label>担当者</label>
    <select id="employeeSelect"></select>
    
    <label>工事件名</label>
    <select id="projectSelect"></select>
    
    <label>備考</label>
    <textarea id="notes" rows="2" placeholder="破損、汚染、不具合などあれば記入"></textarea>
    
    <div style="display: flex; gap: 10px; margin-top: 10px;">
      <button class="btn-primary" style="flex: 1; background: #1a73e8;" onclick="submitRecord('貸出')">貸出</button>
      <button class="btn-primary" style="flex: 1; background: #34a853;" onclick="submitRecord('返却')">返却</button>
    </div>
    <button class="btn-primary" style="background:#f1f3f4; color:#333; margin-top:10px;" onclick="showPage('pageScan'); scanning=true; tick();">スキャンに戻る</button>
  </div>
</div>

<div id="pageList" class="page">
    <input type="text" id="searchInput" placeholder="工具番号や名前で検索..." oninput="filterTools()">
    <div id="toolListContainer"></div>
</div>

<div class="nav-bar">
  <div class="nav-item" onclick="showPage('pageScan')">📷<br>スキャン</div>
  <div class="nav-item" onclick="showPage('pageList')">📋<br>一覧</div>
</div>

<script>
// --- 設定 ---
const GAS_URL = "あなたのGASのURL"; // 貼り替えてください

let masterData = { employees: [], projects: [], tools: [] };
let video = document.getElementById("video");
let canvasElement = document.getElementById("canvas");
let canvas = canvasElement.getContext("2d");
let scanning = false;
let currentTool = null;

// 初期化
async function init() {
  try {
    const res = await fetch('master_data.json');
    masterData = await res.json();
    
    // プルダウン作成
    const empSelect = document.getElementById('employeeSelect');
    masterData.employees.forEach(e => {
        let opt = document.createElement('option');
        opt.value = opt.textContent = e;
        empSelect.appendChild(opt);
    });
    
    const projSelect = document.getElementById('projectSelect');
    masterData.projects.forEach(p => {
        let opt = document.createElement('option');
        opt.value = opt.textContent = p;
        projSelect.appendChild(opt);
    });
    renderToolList();
  } catch (e) { console.error("Data load error", e); }
}

async function manualStart() {
    document.getElementById('camera-trigger').style.display = 'none';
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment" } 
        });
        video.srcObject = stream;
        video.setAttribute("playsinline", true); 
        await video.play();
        scanning = true;
        requestAnimationFrame(tick);
    } catch (err) {
        alert("カメラ起動エラー: " + err);
    }
}

function tick() {
  if (video.readyState === video.HAVE_ENOUGH_DATA && scanning) {
    canvasElement.height = video.videoHeight;
    canvasElement.width = video.videoWidth;
    canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
    const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
    
    if (code) {
        handleQRResult(code.data);
        return;
    }
  }
  if (scanning) requestAnimationFrame(tick);
}

function handleQRResult(toolId) {
  const tool = masterData.tools.find(t => t.id === toolId);
  if (!tool) {
    alert("未登録の工具です: " + toolId);
    requestAnimationFrame(tick);
    return;
  }
  currentTool = tool;
  scanning = false;
  document.getElementById('displayId').textContent = "管理番号: " + tool.id;
  document.getElementById('displayName').textContent = tool.name;
  showPage('pageForm');
}

// 登録処理
async function submitRecord(type) {
  const loading = document.getElementById('loading');
  loading.style.display = 'flex';

  const data = {
    type: type,
    toolId: currentTool.id,
    toolName: currentTool.name,
    employee: document.getElementById('employeeSelect').value,
    project: document.getElementById('projectSelect').value,
    notes: document.getElementById('notes').value
  };

  try {
    await fetch(GAS_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });
    
    // 送信成功後の処理
    loading.style.display = 'none';
    alert(type + " を記録しました！次の工具をスキャンしてください。");
    
    // 備考だけクリアして、スキャン画面に戻る
    document.getElementById('notes').value = ''; 
    showPage('pageScan');
    scanning = true;
    requestAnimationFrame(tick);
    
  } catch (err) { 
    loading.style.display = 'none';
    alert("送信エラーが発生しました。"); 
  }
}

function renderToolList(filter = "") {
  const container = document.getElementById('toolListContainer');
  const filtered = masterData.tools.filter(t => t.id.includes(filter) || t.name.includes(filter));
  container.innerHTML = filtered.slice(0, 50).map(t => `
    <div style="padding:15px; border-bottom:1px solid #eee; background:white;" onclick="handleQRResult('${t.id}')">
      <b style="color:#1a73e8;">${t.id}</b><br><span style="font-size:14px;">${t.name}</span>
    </div>
  `).join('');
}

function filterTools() {
  renderToolList(document.getElementById('searchInput').value);
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

window.onload = init;
</script>
</body>
</html>
